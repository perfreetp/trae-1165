<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流浪猫狗档案管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">🐾</div>
                <h1 class="app-title">救助站管理</h1>
                <p class="app-subtitle">流浪猫狗档案系统</p>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-module="animal-list">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">动物列表</span>
                </a>
                <a href="#" class="nav-item" data-module="intake">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">入站登记</span>
                </a>
                <a href="#" class="nav-item" data-module="medical">
                    <span class="nav-icon">🏥</span>
                    <span class="nav-text">医疗护理</span>
                </a>
                <a href="#" class="nav-item" data-module="foster">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">寄养领养</span>
                </a>
                <a href="#" class="nav-item" data-module="expense">
                    <span class="nav-icon">💰</span>
                    <span class="nav-text">费用物资</span>
                </a>
                <a href="#" class="nav-item" data-module="followup">
                    <span class="nav-icon">📞</span>
                    <span class="nav-text">回访记录</span>
                </a>
                <a href="#" class="nav-item" data-module="report">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">报表打印</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="station-capacity">
                    <div class="capacity-label">在站容量</div>
                    <div class="capacity-bar">
                        <div class="capacity-fill" id="capacityFill"></div>
                    </div>
                    <div class="capacity-text" id="capacityText">0 / 50</div>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="globalSearch" placeholder="搜索档案：名称、芯片号、品种..." autocomplete="off">
                </div>
                <div class="top-bar-actions">
                    <div class="reminder-bell" id="reminderBell" title="用药提醒">
                        🔔
                        <span class="badge" id="reminderBadge" style="display:none">0</span>
                    </div>
                    <div class="current-date" id="currentDate"></div>
                </div>
            </header>
            <div class="content-area" id="contentArea">
                <div class="module-panel active" id="module-animal-list"></div>
                <div class="module-panel" id="module-intake"></div>
                <div class="module-panel" id="module-medical"></div>
                <div class="module-panel" id="module-foster"></div>
                <div class="module-panel" id="module-expense"></div>
                <div class="module-panel" id="module-followup"></div>
                <div class="module-panel" id="module-report"></div>
            </div>
        </main>
    </div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-container" id="modalContainer"></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="js/store.js"></script>
    <script src="js/animal-list.js"></script>
    <script src="js/intake.js"></script>
    <script src="js/medical.js"></script>
    <script src="js/foster.js"></script>
    <script src="js/expense.js"></script>
    <script src="js/followup.js"></script>
    <script src="js/report.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
